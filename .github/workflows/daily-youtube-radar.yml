# Daily YouTube radar workflow
name: Daily YouTube Radar

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-daily-youtube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch daily YouTube radar data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-daily-youtube.mjs

      - name: Commit updated radar data
        run: |
          if [ -z "$(git status --porcelain -- public/daily-prompts.json)" ]; then
            echo "No daily radar data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/daily-prompts.json
          git commit -m "chore: update daily YouTube radar data"
          git push
